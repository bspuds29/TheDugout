<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="320x320" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Primary meta -->
    <title>The Dugout · MLB Analytics</title>
    <meta name="description" content="Advanced MLB analytics platform — live stats, player comparisons, team standings, trade analysis, and front-office tools powered by real-time data." />
    <meta name="theme-color" content="#080d14" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://thedugout.app/" />
    <meta property="og:title"       content="The Dugout · MLB Analytics" />
    <meta property="og:description" content="Advanced MLB analytics platform — live stats, player comparisons, team standings, trade analysis, and front-office tools powered by real-time data." />
    <meta property="og:image"       content="https://thedugout.app/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="The Dugout · MLB Analytics" />
    <meta name="twitter:description" content="Advanced MLB analytics platform — live stats, player comparisons, team standings, trade analysis, and front-office tools powered by real-time data." />
    <meta name="twitter:image"       content="https://thedugout.app/og-image.png" />

    <!-- Apply saved theme before first paint to prevent flash -->
    <script>
      (function() {
        var t = localStorage.getItem('dugout-theme');
        if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
