name: Daily Baseball Tweet

on:
  # Schedule paused — re-enable by uncommenting the lines below
  # schedule:
  #   - cron: '0 4  * * *'   # 12:00 AM ET
  #   - cron: '0 16 * * *'   # 12:00 PM ET

  # Manual trigger still available for testing
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (generate tweet but do not post)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']
      lookback_days:
        description: 'Days back to look for game stats (default 1 = yesterday)'
        required: false
        default: '1'

permissions:
  contents: write   # needed to commit used_stats.json back to the repo

jobs:
  tweet:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so git push works
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: bot/requirements.txt

      - name: Install dependencies
        run: pip install -r bot/requirements.txt

      - name: Run tweet bot
        env:
          TWITTER_API_KEY:       ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:    ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:  ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          TWITTER_BEARER_TOKEN:  ${{ secrets.TWITTER_BEARER_TOKEN }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          DRY_RUN:               ${{ github.event.inputs.dry_run || 'false' }}
          LOOKBACK_DAYS:         ${{ github.event.inputs.lookback_days || '1' }}
          MLB_SEASON:            '2026'
          INCLUDE_IMAGE:         ${{ vars.INCLUDE_IMAGE || 'true' }}
        run: python bot/main.py

      - name: Commit state changes
        if: always()
        run: |
          git config user.name  "TheDugout Bot"
          git config user.email "bot@the-dugout-iota.vercel.app"

          # 1. Save bot outputs before touching git history
          cp bot/state/used_stats.json /tmp/used_stats.json 2>/dev/null || true
          cp bot/logs/bot.log          /tmp/bot.log         2>/dev/null || true

          # 2. Hard-reset to whatever is on remote right now (picks up any new commits
          #    that landed while the bot was running, e.g. a manual push)
          git fetch origin main
          git reset --hard origin/main

          # 3. Restore our bot outputs on top of the fresh remote state
          cp /tmp/used_stats.json bot/state/used_stats.json 2>/dev/null || true
          cp /tmp/bot.log         bot/logs/bot.log          2>/dev/null || true

          # 4. Commit and push — guaranteed fast-forward now
          git add -f bot/state/used_stats.json bot/logs/bot.log
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "bot: update tweet state $(date -u +%Y-%m-%d)"
            git push origin main
          fi
